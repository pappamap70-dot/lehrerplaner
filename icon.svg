  <rect x="216" y="325" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="240" y="325" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="264" y="325" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="288" y="325" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="312" y="325" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="192" y="351" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="216" y="351" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="240" y="351" width="14" height="14" rx="4" fill="#F59E0B"/>
  <rect x="264" y="351" width="14" height="14" rx="4" fill="#ffffff"/>
  <rect x="288" y="351" width="14" height="14" rx="4" fill="#ffffff"/>
