<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded background -->
  <rect width="512" height="512" rx="80" fill="#4A6FA5"/>
  <!-- Book body -->
  <rect x="110" y="96" width="292" height="320" rx="14" fill="#ffffff"/>
  <!-- Book spine -->
  <rect x="110" y="96" width="44" height="320" rx="10" fill="#2d4f7a"/>
  <!-- Text lines -->
